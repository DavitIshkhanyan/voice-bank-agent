version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50100-50200:50100-50200/udp"

  retrieval-api:
    build:
      context: .
      dockerfile: services/retrieval-api/Dockerfile
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_LLM_MODEL=${OPENAI_LLM_MODEL:-gpt-4.1-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - MIN_GROUNDING_SCORE=${MIN_GROUNDING_SCORE:-0.12}
      - CHUNKS_PATH=${CHUNKS_PATH:-/app/data/knowledge/processed/chunks.jsonl}
      - RETRIEVER_BACKEND=${RETRIEVER_BACKEND:-auto}
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-/app/data/chroma}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-bank_chunks}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_INTERNAL_URL=${LIVEKIT_INTERNAL_URL:-http://livekit:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
      - LIVEKIT_AGENT_NAME=${LIVEKIT_AGENT_NAME:-armenian-bank-voice-agent}
      - WEB_CLIENT_ORIGIN=${WEB_CLIENT_ORIGIN:-http://localhost:8080}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  voice-agent:
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    restart: unless-stopped
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_STT_MODEL=${OPENAI_STT_MODEL:-gpt-4o-mini-transcribe}
      - OPENAI_LLM_MODEL=${OPENAI_LLM_MODEL:-gpt-4.1-mini}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-alloy}
      - RETRIEVAL_API_URL=http://retrieval-api:8000
    depends_on:
      livekit:
        condition: service_started
      retrieval-api:
        condition: service_healthy

